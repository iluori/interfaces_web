<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - CodeCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-black flex items-center justify-center min-h-screen">
    <div class="w-full max-w-sm bg-gray-900 p-8 rounded-2xl">
        <h2 class="text-white text-2xl font-bold mb-6 text-center">Formulario de admisión</h2>
        <form action="#" method="POST" class="flex flex-col gap-4">
            <label class="text-gray-300 text-sm" for="nombre">Nombre completo</label>
            <input id="nombre" name="nombre" type="text" required
                   class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"/>

            <label class="text-gray-300 text-sm" for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" required
                   class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"/>

            <label class="text-gray-300 text-sm" for="telefono">Teléfono</label>
            <input id="telefono" name="telefono" type="tel" required
                   class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"/>

            <label class="text-gray-300 text-sm" for="mensaje">¿Por qué quieres ingresar?</label>
            <textarea id="mensaje" name="mensaje" rows="4" required
                      class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>

            <button type="submit" class="mt-4 px-4 py-2 bg-white text-black rounded-full font-semibold hover:bg-gray-100 transition">
                Enviar solicitud
            </button>
        </form>
        <p class="text-gray-400 text-center text-sm mt-4">
            <a href="index.html" class="hover:text-white">Volver al inicio</a>
        </p>
    </div>
</body>
</html>
